<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2e7d32" />
  <title>WMS — Rastreabilidade</title>
  <style>
    :root {
      --verde-escuro: #2e7d32;
      --verde-escuro-hover: #1b5e20;
      --verde-claro: #4caf50;
      --branco: #ffffff;
      --cinza-borda: #cfd8dc;
      --cinza-texto: #5f6b6d;
      --texto-escuro: #1c2526;
      --erro-bg: #fdecea;
      --erro-borda: #f5c6cb;
      --erro-texto: #b71c1c;
      --sucesso-bg: #e8f5e9;
      --sucesso-borda: #a5d6a7;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--branco);
      color: var(--texto-escuro);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: var(--branco);
      width: 100%;
      max-width: 1100px;
      border-radius: 14px;
      box-shadow: 0 12px 32px rgba(27, 94, 32, 0.18), 0 2px 8px rgba(0, 0, 0, 0.06);
      overflow: hidden;
    }

    .card__header {
      background: linear-gradient(135deg, var(--verde-escuro), var(--verde-claro));
      color: var(--branco);
      padding: 2rem 1.75rem 1.75rem;
      text-align: center;
    }

    .card__logo {
      width: 56px;
      height: 56px;
      margin: 0 auto 0.85rem;
      display: block;
    }

    .card__title {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .card__subtitle {
      margin-top: 0.35rem;
      font-size: 0.9rem;
      opacity: 0.92;
    }

    .card__body {
      padding: 1.75rem;
    }

    .barra-topo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .barra-topo__usuario {
      font-size: 0.9rem;
      color: var(--cinza-texto);
    }

    .barra-topo__acoes {
      display: flex;
      gap: 0.5rem;
    }

    .secao {
      border: 1.5px solid var(--cinza-borda);
      border-radius: 10px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .secao__titulo {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--verde-escuro);
      margin-bottom: 1rem;
    }

    .campo {
      margin-bottom: 1.15rem;
    }

    .campo__label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--texto-escuro);
      margin-bottom: 0.4rem;
    }

    .campo__input {
      width: 100%;
      padding: 0.7rem 0.85rem;
      font-size: 1rem;
      color: var(--texto-escuro);
      border: 1.5px solid var(--cinza-borda);
      border-radius: 8px;
      background: var(--branco);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      font-family: inherit;
    }

    .campo__input:focus {
      outline: none;
      border-color: var(--verde-claro);
      box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.22);
    }

    .campo__input:disabled {
      background: #f4f6f6;
      color: #9aa5a6;
      cursor: not-allowed;
    }

    .botao {
      padding: 0.8rem 1.25rem;
      font-size: 1rem;
      font-weight: 700;
      color: var(--branco);
      background: var(--verde-escuro);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.05s ease;
    }

    .botao:hover {
      background: var(--verde-escuro-hover);
    }

    .botao:active {
      transform: translateY(1px);
    }

    .botao:disabled {
      background: #9aa5a6;
      cursor: progress;
    }

    .botao--secundario {
      background: var(--branco);
      color: var(--verde-escuro);
      border: 1.5px solid var(--cinza-borda);
    }

    .botao--secundario:hover {
      background: #f4f6f6;
      color: var(--verde-escuro-hover);
    }

    .botao--pequeno {
      padding: 0.45rem 0.85rem;
      font-size: 0.85rem;
    }

    .mensagem {
      margin-bottom: 1.1rem;
      padding: 0.75rem 0.9rem;
      border-radius: 8px;
      font-size: 0.9rem;
      border: 1.5px solid transparent;
      display: none;
    }

    .mensagem--erro {
      display: block;
      background: var(--erro-bg);
      border-color: var(--erro-borda);
      color: var(--erro-texto);
    }

    .filtro {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .filtro .campo {
      flex: 1 1 240px;
      margin-bottom: 0;
    }

    .tabela-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th, td {
      text-align: left;
      padding: 0.65rem 0.75rem;
      border-bottom: 1px solid var(--cinza-borda);
      vertical-align: top;
    }

    th {
      background: #f4f6f6;
      color: var(--cinza-texto);
      font-weight: 700;
      white-space: nowrap;
    }

    td.qtd, th.qtd {
      text-align: right;
      white-space: nowrap;
    }

    .badge {
      display: inline-block;
      padding: 0.18rem 0.55rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .badge--entrada {
      background: #e8f5e9;
      color: #1b5e20;
      border-color: #a5d6a7;
    }

    .badge--saida {
      background: #fdecea;
      color: #b71c1c;
      border-color: #f5c6cb;
    }

    .badge--transferencia {
      background: #e3f2fd;
      color: #0d47a1;
      border-color: #90caf9;
    }

    .badge--armazenagem {
      background: #eceff1;
      color: #37474f;
      border-color: #b0bec5;
    }

    .badge--ajuste {
      background: #fff3e0;
      color: #e65100;
      border-color: #ffcc80;
    }

    .registros {
      margin-top: 0.85rem;
      font-size: 0.82rem;
      color: var(--cinza-texto);
      text-align: right;
    }

    .vazio {
      padding: 1rem;
      text-align: center;
      color: var(--cinza-texto);
      font-size: 0.9rem;
    }

    .rodape {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.8rem;
    }

    .rodape a {
      color: var(--verde-escuro);
      text-decoration: none;
      font-weight: 600;
    }

    .rodape a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .card__header { padding: 1.5rem 1.25rem; }
      .card__body { padding: 1.5rem 1.25rem; }
      .card__title { font-size: 1.2rem; }
      .secao { padding: 1rem; }
      .filtro { flex-direction: column; align-items: stretch; }
      .filtro .botao { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="card" role="main">
    <header class="card__header">
      <svg class="card__logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M3 7.5 12 3l9 4.5v9L12 21l-9-4.5v-9Z" stroke="#ffffff" stroke-width="1.6" stroke-linejoin="round" />
        <path d="m3 7.5 9 4.5 9-4.5M12 12v9" stroke="#ffffff" stroke-width="1.6" stroke-linejoin="round" />
        <path d="M7.5 5.25 16.5 9.75" stroke="#ffffff" stroke-width="1.6" stroke-linejoin="round" />
      </svg>
      <h1 class="card__title">WMS — Rastreabilidade</h1>
      <p class="card__subtitle">Histórico de movimentações (entrada, armazenagem, transferência, saída, ajuste)</p>
    </header>

    <div class="card__body">
      <div class="barra-topo">
        <span class="barra-topo__usuario" id="barraUsuario"></span>
        <span class="barra-topo__acoes">
          <a class="botao botao--secundario botao--pequeno" href="menu.html">Menu</a>
          <button class="botao botao--secundario botao--pequeno" type="button" id="botaoSair">Sair</button>
        </span>
      </div>

      <div id="mensagem" class="mensagem" role="alert" aria-live="polite"></div>

      <section class="secao" aria-labelledby="tituloRastreabilidade">
        <h2 class="secao__titulo" id="tituloRastreabilidade">Histórico de movimentações</h2>

        <div class="filtro">
          <div class="campo">
            <label class="campo__label" for="campoProduto">Produto</label>
            <select class="campo__input" id="campoProduto">
              <option value="">Todos os produtos</option>
            </select>
          </div>
          <div class="campo">
            <label class="campo__label" for="campoTipo">Tipo</label>
            <select class="campo__input" id="campoTipo">
              <option value="">Todos os tipos</option>
              <option value="ENTRADA">Entrada</option>
              <option value="ARMAZENAGEM">Armazenagem</option>
              <option value="TRANSFERENCIA">Transferência</option>
              <option value="SAIDA">Saída</option>
              <option value="AJUSTE">Ajuste</option>
            </select>
          </div>
          <button class="botao botao--secundario" type="button" id="botaoAtualizar">Atualizar</button>
        </div>

        <div class="tabela-wrap">
          <table>
            <thead>
              <tr>
                <th scope="col">Data/Hora</th>
                <th scope="col">Tipo</th>
                <th scope="col">Produto</th>
                <th scope="col" class="qtd">Qtd</th>
                <th scope="col">Origem</th>
                <th scope="col">Destino</th>
                <th scope="col">Usuário</th>
                <th scope="col">Documento</th>
              </tr>
            </thead>
            <tbody id="corpoTabela"></tbody>
          </table>
        </div>
        <div id="listaVazia" class="vazio" hidden>Nenhuma movimentação registrada.</div>
        <p class="registros" id="contadorRegistros" hidden></p>
      </section>

      <p class="rodape">
        <a href="/status">Ver status do serviço</a>
      </p>
    </div>
  </main>

  <script src="sessao.js"></script>
  <script>
    (function () {
      'use strict';

      var usuario = exigirSessao();
      if (!usuario) {
        throw new Error('sem sessão');
      }

      function escaparHtml(texto) {
        var div = document.createElement('div');
        div.textContent = texto == null ? '' : String(texto);
        return div.innerHTML;
      }

      var caixaMensagem = document.getElementById('mensagem');
      var corpoTabela = document.getElementById('corpoTabela');
      var listaVazia = document.getElementById('listaVazia');
      var contadorRegistros = document.getElementById('contadorRegistros');
      var campoProduto = document.getElementById('campoProduto');
      var campoTipo = document.getElementById('campoTipo');
      var botaoAtualizar = document.getElementById('botaoAtualizar');

      var movimentacoesAtuais = [];
      var produtosPorId = {};
      var localizacoesPorId = {};
      var usuariosPorId = {};
      var lookupsCarregados = false;

      document.getElementById('barraUsuario').innerHTML =
        escaparHtml(usuario.nome) + ' (' + escaparHtml(usuario.perfil) + ')';
      document.getElementById('botaoSair').addEventListener('click', function () {
        sair();
      });

      function exibirMensagem(tipo, htmlConteudo) {
        caixaMensagem.className = 'mensagem mensagem--' + tipo;
        caixaMensagem.innerHTML = htmlConteudo;
        caixaMensagem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      function limparMensagem() {
        caixaMensagem.className = 'mensagem';
        caixaMensagem.innerHTML = '';
      }

      function mensagemErroDaResposta(dados, fallback) {
        if (dados && (dados.erro || dados.message)) {
          return dados.erro || dados.message;
        }
        return fallback;
      }

      function lerJson(resposta) {
        return resposta.json()
          .then(function (dados) {
            return { ok: resposta.ok, dados: dados };
          })
          .catch(function () {
            return { ok: resposta.ok, dados: null };
          });
      }

      function truncarId(id) {
        if (id == null) {
          return '—';
        }
        var texto = String(id);
        if (texto.length <= 8) {
          return texto;
        }
        return texto.slice(0, 8) + '…';
      }

      function formatarDataHora(iso) {
        if (iso == null) {
          return '—';
        }
        var data = new Date(iso);
        if (isNaN(data.getTime())) {
          return String(iso);
        }
        var dia = String(data.getDate()).padStart(2, '0');
        var mes = String(data.getMonth() + 1).padStart(2, '0');
        var ano = data.getFullYear();
        var hora = String(data.getHours()).padStart(2, '0');
        var min = String(data.getMinutes()).padStart(2, '0');
        return dia + '/' + mes + '/' + ano + ' ' + hora + ':' + min;
      }

      function rotuloTipo(tipo) {
        switch (tipo) {
          case 'ENTRADA': return 'Entrada';
          case 'ARMAZENAGEM': return 'Armazenagem';
          case 'TRANSFERENCIA': return 'Transferência';
          case 'SAIDA': return 'Saída';
          case 'AJUSTE': return 'Ajuste';
          default: return tipo == null ? '—' : String(tipo);
        }
      }

      function classeBadgeTipo(tipo) {
        switch (tipo) {
          case 'ENTRADA': return 'badge badge--entrada';
          case 'ARMAZENAGEM': return 'badge badge--armazenagem';
          case 'TRANSFERENCIA': return 'badge badge--transferencia';
          case 'SAIDA': return 'badge badge--saida';
          case 'AJUSTE': return 'badge badge--ajuste';
          default: return 'badge';
        }
      }

      function rotuloProduto(produtoId) {
        if (produtoId == null) {
          return '—';
        }
        var p = produtosPorId[produtoId];
        if (!p) {
          return truncarId(produtoId);
        }
        var sku = p.sku == null ? '' : String(p.sku);
        var nome = p.nome == null ? '' : String(p.nome);
        if (sku === '' && nome === '') {
          return truncarId(produtoId);
        }
        if (sku === '') return nome;
        if (nome === '') return sku;
        return sku + ' — ' + nome;
      }

      function rotuloLocalizacao(localizacaoId) {
        if (localizacaoId == null) {
          return '—';
        }
        var l = localizacoesPorId[localizacaoId];
        if (!l) {
          return truncarId(localizacaoId);
        }
        return l.codigo == null || String(l.codigo) === ''
          ? truncarId(localizacaoId)
          : String(l.codigo);
      }

      function rotuloUsuario(usuarioId) {
        if (usuarioId == null) {
          return '—';
        }
        var u = usuariosPorId[usuarioId];
        if (!u) {
          return truncarId(usuarioId);
        }
        if (u.nome != null && String(u.nome) !== '') {
          return String(u.nome);
        }
        if (u.login != null && String(u.login) !== '') {
          return String(u.login);
        }
        return truncarId(usuarioId);
      }

      function popularSelectProdutos(produtos) {
        // mantém a opção "Todos" e adiciona o restante
        var selecionado = campoProduto.value;
        while (campoProduto.options.length > 1) {
          campoProduto.remove(1);
        }
        produtos.forEach(function (p) {
          var opt = document.createElement('option');
          opt.value = String(p.id);
          var sku = p.sku == null ? '' : String(p.sku);
          var nome = p.nome == null ? '' : String(p.nome);
          var rotulo;
          if (sku === '' && nome === '') {
            rotulo = truncarId(p.id);
          } else if (sku === '') {
            rotulo = nome;
          } else if (nome === '') {
            rotulo = sku;
          } else {
            rotulo = sku + ' — ' + nome;
          }
          opt.textContent = rotulo;
          campoProduto.appendChild(opt);
        });
        if (selecionado) {
          campoProduto.value = selecionado;
        }
      }

      function carregarLookups() {
        return Promise.all([
          fetch('/api/produtos').then(lerJson).catch(function () { return { ok: false, dados: null }; }),
          fetch('/api/localizacoes').then(lerJson).catch(function () { return { ok: false, dados: null }; }),
          fetch('/api/usuarios').then(lerJson).catch(function () { return { ok: false, dados: null }; }),
        ]).then(function (resultados) {
          var resProdutos = resultados[0];
          var resLocs = resultados[1];
          var resUsuarios = resultados[2];

          produtosPorId = {};
          localizacoesPorId = {};
          usuariosPorId = {};

          var produtos = (resProdutos.ok && Array.isArray(resProdutos.dados)) ? resProdutos.dados : [];
          produtos.forEach(function (p) {
            if (p && p.id != null) {
              produtosPorId[p.id] = { sku: p.sku, nome: p.nome };
            }
          });

          var localizacoes = (resLocs.ok && Array.isArray(resLocs.dados)) ? resLocs.dados : [];
          localizacoes.forEach(function (l) {
            if (l && l.id != null) {
              localizacoesPorId[l.id] = { codigo: l.codigo };
            }
          });

          var usuarios = (resUsuarios.ok && Array.isArray(resUsuarios.dados)) ? resUsuarios.dados : [];
          usuarios.forEach(function (u) {
            if (u && u.id != null) {
              usuariosPorId[u.id] = { nome: u.nome, login: u.login };
            }
          });

          // Ordena produtos por SKU para o select
          produtos.sort(function (a, b) {
            var sa = a && a.sku != null ? String(a.sku) : '';
            var sb = b && b.sku != null ? String(b.sku) : '';
            return sa.localeCompare(sb, 'pt-BR');
          });
          popularSelectProdutos(produtos);

          lookupsCarregados = true;
        });
      }

      function renderizar() {
        corpoTabela.innerHTML = '';

        var tipoFiltro = campoTipo.value;
        var total = movimentacoesAtuais.length;
        var visiveis = tipoFiltro === ''
          ? movimentacoesAtuais
          : movimentacoesAtuais.filter(function (m) { return m.tipo === tipoFiltro; });

        if (total === 0) {
          listaVazia.hidden = false;
          listaVazia.textContent = 'Nenhuma movimentação registrada.';
          contadorRegistros.hidden = true;
          return;
        }

        if (visiveis.length === 0) {
          listaVazia.hidden = false;
          listaVazia.textContent = 'Nenhuma movimentação corresponde aos filtros.';
          contadorRegistros.hidden = true;
          return;
        }

        listaVazia.hidden = true;

        visiveis.forEach(function (m) {
          var tr = document.createElement('tr');

          var tdData = document.createElement('td');
          tdData.textContent = formatarDataHora(m.dataHora);
          tr.appendChild(tdData);

          var tdTipo = document.createElement('td');
          var spanBadge = document.createElement('span');
          spanBadge.className = classeBadgeTipo(m.tipo);
          spanBadge.textContent = rotuloTipo(m.tipo);
          tdTipo.appendChild(spanBadge);
          tr.appendChild(tdTipo);

          var tdProduto = document.createElement('td');
          tdProduto.textContent = rotuloProduto(m.produtoId);
          tr.appendChild(tdProduto);

          var tdQtd = document.createElement('td');
          tdQtd.className = 'qtd';
          tdQtd.textContent = typeof m.quantidade === 'number' ? String(m.quantidade) : '—';
          tr.appendChild(tdQtd);

          var tdOrigem = document.createElement('td');
          tdOrigem.textContent = rotuloLocalizacao(m.localizacaoOrigemId);
          tr.appendChild(tdOrigem);

          var tdDestino = document.createElement('td');
          tdDestino.textContent = rotuloLocalizacao(m.localizacaoDestinoId);
          tr.appendChild(tdDestino);

          var tdUsuario = document.createElement('td');
          tdUsuario.textContent = rotuloUsuario(m.usuarioId);
          tr.appendChild(tdUsuario);

          var tdDoc = document.createElement('td');
          tdDoc.textContent = (m.documentoReferencia == null || String(m.documentoReferencia) === '')
            ? '—'
            : String(m.documentoReferencia);
          tr.appendChild(tdDoc);

          corpoTabela.appendChild(tr);
        });

        contadorRegistros.hidden = false;
        if (tipoFiltro === '') {
          contadorRegistros.textContent = 'Registros: ' + visiveis.length;
        } else {
          contadorRegistros.textContent =
            'Registros: ' + visiveis.length + ' de ' + total;
        }
      }

      function carregarMovimentacoes() {
        corpoTabela.innerHTML = '';
        listaVazia.hidden = true;
        contadorRegistros.hidden = true;
        botaoAtualizar.disabled = true;
        botaoAtualizar.textContent = 'Atualizando...';

        var produtoId = campoProduto.value;
        var url = '/api/movimentacoes';
        if (produtoId) {
          url += '?produtoId=' + encodeURIComponent(produtoId);
        }

        return fetch(url)
          .then(lerJson)
          .then(function (resultado) {
            if (!resultado.ok || !Array.isArray(resultado.dados)) {
              movimentacoesAtuais = [];
              listaVazia.hidden = false;
              listaVazia.textContent = mensagemErroDaResposta(
                resultado.dados, 'Não foi possível carregar as movimentações.'
              );
              return;
            }
            movimentacoesAtuais = resultado.dados;
            limparMensagem();
            renderizar();
          })
          .catch(function () {
            movimentacoesAtuais = [];
            listaVazia.hidden = false;
            listaVazia.textContent = 'Falha de conexão ao carregar as movimentações.';
          })
          .finally(function () {
            botaoAtualizar.disabled = false;
            botaoAtualizar.textContent = 'Atualizar';
          });
      }

      campoProduto.addEventListener('change', function () {
        limparMensagem();
        carregarMovimentacoes();
      });

      campoTipo.addEventListener('change', function () {
        renderizar();
      });

      botaoAtualizar.addEventListener('click', function () {
        limparMensagem();
        if (!lookupsCarregados) {
          carregarLookups().then(carregarMovimentacoes);
        } else {
          carregarMovimentacoes();
        }
      });

      // Inicial: carrega lookups primeiro (para popular o select de produtos e os mapas),
      // depois carrega as movimentações.
      carregarLookups()
        .catch(function () {
          exibirMensagem(
            'erro',
            'Não foi possível carregar todos os dados auxiliares (produtos / localizações / usuários). ' +
            'A lista de movimentações será exibida com IDs truncados quando o nome não for encontrado.'
          );
        })
        .then(function () {
          return carregarMovimentacoes();
        });
    })();
  </script>
</body>
</html>
